<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>5040 | پیام صوتی</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:tahoma;
    background:url("background.jpg") center center/cover no-repeat fixed;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
}

.player{

    position:relative;
    z-index:10;

    width:360px;

    background:rgba(20,20,20,.45);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:28px;

    padding:35px;

    text-align:center;

    color:#fff;

    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.logo{

    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;

    animation:spin 12s linear infinite;
    animation-play-state:paused;
}

audio:playing + .logo{
    animation-play-state:running;
}

h2{

    margin-top:20px;
    font-size:32px;
}

p{

    color:#ddd;
    margin:10px 0 25px;
}

audio{

    width:100%;
}

.footer{

    margin-top:25px;
    font-size:13px;
    color:#eee;
    opacity:.9;
}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="player">

<div class="logo">
🎧
</div>

<h2>پیام صوتی</h2>

<p>برای شنیدن پیام روی دکمه پخش بزنید</p>

<audio controls>
<source src="4c2a2acc-c6c7-4880-8d16-43e8e4c6a744%20(1).mp3" type="audio/mpeg">
</audio>

<div class="footer">
5040 • همکده • پزشکت • HB • قاف
</div>

</div>

</body>
</html>
